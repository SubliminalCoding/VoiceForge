<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--surface:#111113;--surface2:#18181b;--border:#27272a;
  --text:#fafafa;--text2:#a1a1aa;--text3:#8a8a92;
  --accent:#6366f1;--accent2:#818cf8;--accent-glow:rgba(99,102,241,0.15);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--accent2);text-decoration:none;transition:color 0.15s}
a:hover{color:var(--text)}
.container{max-width:760px;margin:0 auto;padding:0 24px;width:100%}

.skip-link{position:absolute;top:-100px;left:16px;z-index:1000;padding:10px 18px;border-radius:8px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;transition:top 0.15s ease}
.skip-link:focus{top:12px;color:#fff}

nav{padding:16px 0;background:rgba(9,9,11,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
nav .container{display:flex;align-items:center;justify-content:center;max-width:1080px}
.logo{font-size:20px;font-weight:900;letter-spacing:-0.03em}.logo span{color:var(--accent2)}
.logo a{color:inherit}.logo a:hover{color:inherit}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 0;text-align:center;position:relative}
main::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);pointer-events:none;z-index:0}
main .container{position:relative;z-index:1}

.error-code{font-size:clamp(96px,14vw,180px);font-weight:900;letter-spacing:-0.05em;line-height:1;margin-bottom:8px;background:linear-gradient(135deg,var(--accent2),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h1{font-size:clamp(28px,4vw,40px);font-weight:900;letter-spacing:-0.035em;line-height:1.15;margin-bottom:14px}
p.lead{font-size:17px;color:var(--text2);max-width:480px;margin:0 auto 36px;line-height:1.65}
.requested{display:inline-block;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;margin-bottom:36px;word-break:break-all;max-width:100%}

.cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{display:inline-block;padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;font-size:15px;font-weight:700;transition:transform 0.2s,box-shadow 0.2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(99,102,241,0.35);color:#fff}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{display:inline-block;padding:14px 28px;border-radius:12px;background:transparent;color:var(--text);font-size:15px;font-weight:600;border:1px solid var(--border);transition:border-color 0.2s,background 0.2s}
.btn-secondary:hover{border-color:var(--text3);background:var(--surface2);color:#fff}

footer{padding:32px 0;border-top:1px solid var(--border);text-align:center;color:var(--text3);font-size:13px}
footer a{color:var(--text3)}footer a:hover{color:var(--text)}

:focus-visible{outline:2px solid var(--accent2);outline-offset:3px;border-radius:4px}
.btn-primary:focus-visible{outline-color:#fff;box-shadow:0 0 0 4px rgba(99,102,241,0.45)}

@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
</style>
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>

<nav aria-label="Primary">
  <div class="container">
    <a href="/" class="logo" aria-label="VoiceForge home">Voice<span>Forge</span></a>
  </div>
</nav>

<main id="main">
  <div class="container">
    <div class="error-code" aria-hidden="true">404</div>
    <h1>This page wandered off.</h1>
    <p class="lead">The link you followed doesn't exist (or may have moved). The page below is what you're probably looking for.</p>
    <div class="requested" id="requested-path"></div>
    <div class="cta-row">
      <a href="/" class="btn-primary">Back to Home</a>
      <a href="/#pricing" class="btn-secondary">See Pricing</a>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <p>&copy; <span id="footer-year">2026</span> Redwood Digital, LLC &middot; <a href="https://usevoiceforge.com">usevoiceforge.com</a></p>
  </div>
</footer>

<script>
// Show the requested path so the user can see what they were looking for —
// helps when 404s come from typos in shared URLs.
(function() {
  var el = document.getElementById('requested-path');
  if (!el) return;
  var path = location.pathname + location.search;
  if (path === '/' || path === '/404.html') {
    el.style.display = 'none';
  } else {
    el.textContent = 'You requested: ' + path;
  }
})();
document.getElementById('footer-year').textContent = String(new Date().getFullYear());
</script>

</body>
</html>
